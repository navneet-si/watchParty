<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Party</title>
    <style>
        body { width: 200px; padding: 10px; font-family: sans-serif; text-align: center; }
        button { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; border-radius: 5px; border: none; color: white; }
        input { width: 90%; padding: 8px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #ccc; }
        .divider { border-top: 1px solid #ddd; margin: 10px 0; }
    </style>
</head>
<body>
    <h3>🎥 Sync Party</h3>

    <button id="side_bar" style="background-color: #4CAF50;">Create Party</button>
    
    <div class="divider"></div>
    
    <input type="text" id="room-input" placeholder="Enter Room ID">
    <button id="join-btn" style="background-color: #2196F3;">Join Room</button>

    <script src="popup.js" type="module"></script>
</body>
</html>
